name: CT Sheets Sync

on:
  schedule:
    - cron: '30 18 * * *'   # 12:00 AM IST (18:30 UTC)
    - cron: '30 4 * * *'    # 10:00 AM IST (04:30 UTC)
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Restore session
        uses: actions/download-artifact@v4
        with:
          name: ct-session
          path: .
        continue-on-error: true

      - name: Unpack profile artifact
        run: |
          if [ -f ct_browser_profile.tar.gz ]; then
            echo "Unpacking browser profile..."
            tar -xzf ct_browser_profile.tar.gz
            echo "Profile restored ($(du -sh ct_browser_profile | cut -f1))."
          else
            echo "No profile artifact found."
          fi

      - name: Bootstrap session from secret (first run only)
        env:
          CT_SESSION_GZ_B64: ${{ secrets.CT_SESSION_GZ_B64 }}
          CT_PROFILE_MINIMAL_B64: ${{ secrets.CT_PROFILE_MINIMAL_B64 }}
        run: |
          if [ ! -d ct_browser_profile ]; then
            echo "No profile artifact found — bootstrapping from secrets..."
            if [ -n "$CT_PROFILE_MINIMAL_B64" ]; then
              mkdir -p ct_browser_profile/Default
              printf '%s' "$CT_PROFILE_MINIMAL_B64" | base64 -d | tar -xz -C ct_browser_profile/
              echo "Profile restored from secret."
            fi
            if [ -n "$CT_SESSION_GZ_B64" ]; then
              printf '%s' "$CT_SESSION_GZ_B64" | base64 -d | gunzip > ct_session.json
              echo "Session JSON restored from secret ($(wc -c < ct_session.json) bytes)."
            fi
          fi

      - name: Compute yesterday (IST)
        run: echo "YESTERDAY=$(TZ='Asia/Kolkata' date -d 'yesterday' '+%Y-%m-%d')" >> $GITHUB_ENV

      - name: Run sync
        env:
          CT_LOGIN_EMAIL: ${{ secrets.CT_LOGIN_EMAIL }}
          CT_LOGIN_PASSWORD: ${{ secrets.CT_LOGIN_PASSWORD }}
          CLEVERTAP_ACCOUNT_ID: ${{ secrets.CLEVERTAP_ACCOUNT_ID }}
          CLEVERTAP_REGION: ${{ secrets.CLEVERTAP_REGION }}
          FILTER_CREATOR: ${{ secrets.FILTER_CREATOR }}
          GOOGLE_CREDENTIALS_JSON: credentials.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          WORKSHEET_GID: ${{ secrets.WORKSHEET_GID }}
        run: python ct_browser_sync.py --start $YESTERDAY --end $YESTERDAY

      - name: Pack and save updated session
        if: always()
        run: |
          if [ -d ct_browser_profile ]; then
            tar -czf ct_browser_profile.tar.gz ct_browser_profile/
            echo "Profile packed ($(du -sh ct_browser_profile.tar.gz | cut -f1))."
          fi

      - name: Save updated session
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ct-session
          path: |
            ct_session.json
            ct_browser_profile.tar.gz
          retention-days: 30
          overwrite: true
